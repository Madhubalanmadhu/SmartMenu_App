name: Android Appium E2E Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest # ubuntu-latest supports KVM hardware acceleration and starts much faster than macOS runners
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: 'appium-framework/package.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Appium and Drivers
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Build Real Flutter Android APK
        run: |
          cd flutter_app
          flutter pub get
          flutter build apk --debug \
            --dart-define=API_BASE_URL="${{ secrets.API_BASE_URL }}" \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}" \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID="${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" \
            --dart-define=FIREBASE_PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}" \
            --dart-define=FIREBASE_AUTH_DOMAIN="${{ secrets.FIREBASE_AUTH_DOMAIN }}" \
            --dart-define=FIREBASE_STORAGE_BUCKET="${{ secrets.FIREBASE_STORAGE_BUCKET }}" \
            --dart-define=FIREBASE_MEASUREMENT_ID="${{ secrets.FIREBASE_MEASUREMENT_ID }}"
        
      - name: Install Framework Dependencies
        run: |
          cd appium-framework
          npm ci

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            # Check devices connected
            adb devices
            
            # Start Appium server in background
            appium --port 4723 --log-no-colors-theme > appium.log 2>&1 &
            
            # Wait for Appium to boot
            sleep 10
            
            # Execute tests
            cd appium-framework
            npm run test
        env:
          USE_APK: 'true'
          APK_PATH: '../flutter_app/build/app/outputs/flutter-apk/app-debug.apk'
          APP_PACKAGE: 'com.example.flutter_app'
          APP_ACTIVITY: '.MainActivity'
          TEST_EMAIL: 'madhuhawk79@gmail.com'
          TEST_PASSWORD: 'ikmdmad7'

      - name: Upload Test Reports (Excel & Mochawesome)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartMenu-E2E-Automation-Reports
          path: |
            appium-framework/reports/Mobile_E2E_Report.xlsx
            appium-framework/reports/Mobile_E2E_Report.csv
            appium-framework/reports/Mobile_E2E_Testing_Logs_30.csv
            appium-framework/reports/mochawesome/
            appium-framework/reports/screenshots/
            appium-framework/reports/failures/
            appium-framework/logs/
            appium.log
          if-no-files-found: warn
